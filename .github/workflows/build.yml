name: Build OpenWrt for Gramofon FON2415

on:
  push:
    branches: [ main ]
    paths:
      - 'fon2415.dts'
      - 'fon2415.mk'
      - 'build_openwrt.sh'
      - '.github/workflows/build.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential clang flex bison g++ gawk \
            gcc-multilib g++-multilib gettext git libncurses-dev \
            libssl-dev python3-setuptools rsync swig unzip zlib1g-dev \
            file wget

      - name: Clone OpenWrt (v23.05.3)
        run: |
          git clone --depth 1 --branch v23.05.4 \
            https://git.openwrt.org/openwrt/openwrt.git openwrt

      - name: Copy DTS and device profile
        run: |
          cp fon2415.dts openwrt/target/linux/ath79/dts/qca9341_fon_fon2415.dts
          cat fon2415.mk >> openwrt/target/linux/ath79/image/generic.mk

      - name: Update feeds
        working-directory: openwrt
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Create build configuration
        working-directory: openwrt
        run: |
          # Step 1: set base target and run defconfig
          # The device symbol is unknown at this point — it gets added after
          printf 'CONFIG_TARGET_ath79=y\nCONFIG_TARGET_ath79_generic=y\n' > .config
          make defconfig

          # Step 2: add device and packages after defconfig
          # (defconfig drops unknown symbols; they are now known after step 1)
          printf '%s\n' \
            'CONFIG_TARGET_ath79_generic_DEVICE_fon_fon2415=y' \
            'CONFIG_PACKAGE_kmod-ath9k=y' \
            'CONFIG_PACKAGE_luci=y' \
            'CONFIG_PACKAGE_luci-ssl=y' \
            'CONFIG_PACKAGE_openssh-sftp-server=y' \
            'CONFIG_TARGET_ROOTFS_SQUASHFS=y' \
            >> .config

          # Step 3: second defconfig to expand the new symbols
          make defconfig

          # Verify device is selected
          echo "--- Device selection in .config ---"
          if grep -q 'CONFIG_TARGET_ath79_generic_DEVICE_fon_fon2415=y' .config; then
            echo "OK: fon_fon2415 selected"
          else
            echo "ERROR: device not selected — aborting"
            grep fon2415 .config || true
            exit 1
          fi

      - name: Build image
        working-directory: openwrt
        run: |
          # Open FD 8: OpenWrt writes timing output via >&8.
          # Without this, bash exits with "Bad file descriptor" even
          # when the build itself succeeds.
          exec 8>/dev/null
          make -j$(nproc) V=s 2>&1 | tee /tmp/build.log
          MAKE_EXIT=${PIPESTATUS[0]}
          echo "Make exit code: $MAKE_EXIT"
          [ $MAKE_EXIT -eq 0 ] || { echo "=== Build failed — last 100 lines ==="; tail -100 /tmp/build.log; exit 1; }

      - name: Upload build log (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: /tmp/build.log
          retention-days: 7

      - name: Check output and copy image
        run: |
          echo "=== Contents of bin/targets/ath79/generic/ ==="
          ls -lh openwrt/bin/targets/ath79/generic/
          cp openwrt/bin/targets/ath79/generic/openwrt-ath79-generic-fon_fon2415-squashfs-factory.bin \
             fon2415.image
          ls -lh fon2415.image

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: fon2415-openwrt-image
          path: |
            fon2415.image
            openwrt/bin/targets/ath79/generic/openwrt-ath79-generic-fon_fon2415-squashfs-sysupgrade.bin
          retention-days: 30
