name: Build OpenWrt voor Gramofon FON2415

on:
  push:
    branches: [ main ]
    paths:
      - 'fon2415.dts'
      - 'fon2415.mk'
      - 'build_openwrt.sh'
      - '.github/workflows/build.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build-afhankelijkheden installeren
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential clang flex bison g++ gawk \
            gcc-multilib g++-multilib gettext git libncurses-dev \
            libssl-dev python3-setuptools rsync swig unzip zlib1g-dev \
            file wget

      - name: OpenWrt klonen (v23.05.3)
        run: |
          git clone --depth 1 --branch v23.05.3 \
            https://git.openwrt.org/openwrt/openwrt.git openwrt

      - name: DTS en device-profiel kopiëren
        run: |
          cp fon2415.dts openwrt/target/linux/ath79/dts/qca9341_fon_fon2415.dts
          cat fon2415.mk >> openwrt/target/linux/ath79/image/generic.mk

      - name: Feeds bijwerken
        working-directory: openwrt
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Build-configuratie aanmaken
        working-directory: openwrt
        run: |
          # Stap 1: basis target, dan defconfig
          printf 'CONFIG_TARGET_ath79=y\nCONFIG_TARGET_ath79_generic=y\n' > .config
          make defconfig

          # Stap 2: device en pakketten toevoegen NA defconfig
          # (defconfig verwijdert onbekende symbolen; na defconfig zijn ze bekend)
          printf '%s\n' \
            'CONFIG_TARGET_ath79_generic_DEVICE_fon_fon2415=y' \
            'CONFIG_PACKAGE_kmod-ath9k=y' \
            'CONFIG_PACKAGE_luci=y' \
            'CONFIG_PACKAGE_luci-ssl=y' \
            'CONFIG_PACKAGE_openssh-sftp-server=y' \
            'CONFIG_TARGET_ROOTFS_SQUASHFS=y' \
            >> .config

          # Stap 3: tweede defconfig om de nieuwe symbolen te expanderen
          make defconfig

          # Controleer of het device geselecteerd is
          echo "--- Device selectie in .config ---"
          if grep -q 'CONFIG_TARGET_ath79_generic_DEVICE_fon_fon2415=y' .config; then
            echo "OK: fon_fon2415 geselecteerd"
          else
            echo "FOUT: device niet geselecteerd — afbreken"
            grep fon2415 .config || true
            exit 1
          fi

      - name: Image bouwen
        working-directory: openwrt
        run: |
          make -j$(nproc) V=s 2>&1 | tee /tmp/build.log
          echo "Exit code: ${PIPESTATUS[0]}"
          [ ${PIPESTATUS[0]} -eq 0 ] || { tail -100 /tmp/build.log; exit 1; }

      - name: Buildlog uploaden (altijd)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: /tmp/build.log
          retention-days: 7

      - name: Controleer output en kopieer image
        run: |
          echo "=== Inhoud bin/targets/ath79/generic/ ==="
          ls -lh openwrt/bin/targets/ath79/generic/
          cp openwrt/bin/targets/ath79/generic/openwrt-ath79-generic-fon_fon2415-squashfs-factory.bin \
             fon2415.image
          ls -lh fon2415.image

      - name: Image uploaden als artifact
        uses: actions/upload-artifact@v4
        with:
          name: fon2415-openwrt-image
          path: |
            fon2415.image
            openwrt/bin/targets/ath79/generic/openwrt-ath79-generic-fon_fon2415-squashfs-sysupgrade.bin
          retention-days: 30
